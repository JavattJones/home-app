<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://unpkg.com; img-src 'self' data:; connect-src 'self' https://api.github.com; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Home · Vuestra casa</title>
<meta name="description" content="Gestión de pagos y aportaciones a la casa">
<meta name="theme-color" content="#FBF6EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Home">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/secure-token.css">
</head>
<body>
<div class="phone">
  <div class="appbar" id="appbar"></div>
  <main id="main">
    <section class="screen active" id="s-resumen"></section>
    <section class="screen" id="s-anadir"></section>
    <section class="screen" id="s-movimientos"></section>
    <section class="screen" id="s-hipoteca"></section>
    <section class="screen" id="s-ajustes"></section>
  </main>
  <nav class="tabbar">
    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="resumen"><i class="ph-fill ph-house"></i><span>Resumen</span></button>
      <button class="tab" data-tab="anadir"><i class="ph ph-plus-circle"></i><span>Añadir</span></button>
      <button class="tab" data-tab="movimientos"><i class="ph ph-arrows-left-right"></i><span>Movim.</span></button>
      <button class="tab" data-tab="hipoteca"><i class="ph ph-bank"></i><span>Hipoteca</span></button>
      <button class="tab" data-tab="ajustes"><i class="ph ph-gear-six"></i><span>Ajustes</span></button>
    </div>
    <div class="home-ind"></div>
  </nav>
  <div class="toast" id="toast"></div>
  <div class="sheet-back" id="sheet-back"><div class="sheet" id="sheet"></div></div>
</div>

<script src="assets/chart.umd.min.js"></script>
<script src="assets/secure-token.js"></script>
<script src="assets/app.js"></script>

</html>
